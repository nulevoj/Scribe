<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Перегляд даних</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/header.css}" type="text/css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{common/header :: header}"></div>
<div class="main-container">

    <h3>Перегляд даних</h3>
    <form th:object="${employee}">
        <input type="hidden" name="person" value="employee" readonly/>
        <!-- class Person -->
        <div class="form-group">
            <label for="name" class="control-label">Ім'я:</label>
            <input id="name" class="form-control" th:field="*{name}" readonly/>
        </div>
        <div class="form-group">
            <label for="surname" class="control-label">Прізвище:</label>
            <input id="surname" class="form-control" th:field="*{surname}" readonly/>
        </div>
        <div class="form-group">
            <label for="patronymic" class="control-label">По батькові:</label>
            <input id="patronymic" class="form-control" th:field="*{patronymic}" readonly/>
        </div>
        <!-- class Employee -->
        <div class="form-group">
            <label for="position" class="control-label">Посада:</label>
            <input id="position" class="form-control" th:field="*{position}" readonly/>
        </div>
        <div class="form-group">
            <label for="degree" class="control-label">Науковий ступінь:</label>
            <input id="degree" class="form-control" th:field="*{degree}" readonly/>
        </div>
    </form>

</div>
</body>
</html>
