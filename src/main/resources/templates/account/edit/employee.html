<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Редагування даних</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/header.css}" type="text/css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{common/header :: header}"></div>
<div class="main-container">

    <h3>Редагування даних</h3>
    <form th:method="patch" th:action="@{/account/edit-employee}" th:object="${employee}">
        <div class="form-group" style="margin: 20px 0 20px 0; width: 20%;">
            <a th:href="@{/account}">
                <input type="button" class="form-control btn btn-primary" value="Назад"/>
            </a>
        </div>
        <!-- class Person -->
        <div class="form-group">
            <label for="name" class="control-label">Ім'я:</label>
            <input id="name" class="form-control" th:field="*{name}"/>
        </div>
        <div class="form-group">
            <label for="surname" class="control-label">Прізвище:</label>
            <input id="surname" class="form-control" th:field="*{surname}"/>
        </div>
        <div class="form-group">
            <label for="patronymic" class="control-label">По батькові:</label>
            <input id="patronymic" class="form-control" th:field="*{patronymic}"/>
        </div>
        <!-- class Employee -->
        <div class="form-group">
            <label for="position" class="control-label">Посада:</label>
            <input id="position" class="form-control" th:field="*{position}"/>
        </div>
        <div class="form-group">
            <label for="degree" class="control-label">Науковий ступінь:</label>
            <input id="degree" class="form-control" th:field="*{degree}"/>
        </div>
        <div class="form-group">
            <input type="submit" class="form-control btn btn-primary" value="Зберегти"/>
        </div>
    </form>

</div>
</body>
</html>
