<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Обрати тип акаунту</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/header.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/choose.css}" type="text/css" rel="stylesheet"/>
</head>
<style>
    #choose-container {
        height: 40px;
        margin: 50px 0 20px 25%;
        line-height: 40px;
    }
    .choose-element {
        width: calc(50% - 4px);
    }
</style>
<body>
<div th:replace="~{common/header :: header}"></div>
<div class="main-container">

    <h3>Оберіть тип акаунту</h3>
    <div id="choose-container" class="header-container">
        <a href="#student">
            <div class="header-element choose-element">
                Студент
            </div>
        </a>
        <a href="#employee">
            <div class="header-element choose-element">
                Працівник
            </div>
        </a>
    </div>

    <section id="student">
        <h4>Студент</h4>
        <form th:method="post" th:action="@{/account/choose}" th:object="${student}">
            <div th:replace="~{common/student-form :: student}"></div>
            <div class="form-group">
                <input type="submit" class="form-control btn btn-primary" value="Обрати"/>
            </div>
        </form>
    </section>

    <section id="employee">
        <h4>Працівник</h4>
        <form th:method="post" th:action="@{/account/choose}" th:object="${employee}">
            <div th:replace="~{common/employee-form :: employee}"></div>
            <div class="form-group">
                <input type="submit" class="form-control btn btn-primary" value="Обрати"/>
            </div>
        </form>
    </section>

</div>
</body>
</html>
