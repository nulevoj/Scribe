<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Обрати тип акаунту</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/header.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/choose.css}" type="text/css" rel="stylesheet"/>
</head>
<style>
    #choose-container {
        background-color: #CDB99C;
        width: 50%;
        height: 40px;
        margin: 50px 0 20px 25%;

        color: White;
        text-align: center;
        font-weight: bold;
        white-space: nowrap;
        line-height: 40px;
        box-shadow: 0px 0px 2px 2px #CDB99C;
    }

    .choose-element {
        background-color: transparent;
        width: calc(50% - 4px);
        height: 100%;

        float: left;
        margin: 0 2px 0 2px;
        box-shadow: 0px 0px 2px 2px #330000;
    }

    .choose-element:hover {
        color: #330000;
        box-shadow: 0 0 0 0 #330000;
    }

</style>
<body>
<div th:replace="~{common/header :: header}"></div>
<div class="main-container">

    <h3>Оберіть тип акаунту</h3>
    <div id="choose-container">
        <a href="#student">
            <div class="choose-element">
                Студент
            </div>
        </a>
        <a href="#employee">
            <div class="choose-element">
                Працівник
            </div>
        </a>
    </div>

    <section id="student">
        <h4>Студент</h4>
        <form th:method="post" th:action="@{/account/choose}" th:object="${student}">
            <input type="hidden" name="person" value="student">
            <!-- class Person -->
            <div class="form-group">
                <label for="name_student" class="control-label">Ім'я:</label>
                <input id="name_student" class="form-control" th:field="*{name}"/>
            </div>
            <div class="form-group">
                <label for="surname_student" class="control-label">Прізвище:</label>
                <input id="surname_student" class="form-control" th:field="*{surname}"/>
            </div>
            <div class="form-group">
                <label for="patronymic_student" class="control-label">По батькові:</label>
                <input id="patronymic_student" class="form-control" th:field="*{patronymic}"/>
            </div>
            <!-- class Employee -->
            <div class="form-group">
                <label for="faculty" class="control-label">Факультет:</label>
                <input id="faculty" class="form-control" th:field="*{faculty}"/>
            </div>
            <div class="form-group">
                <label for="degree_student" class="control-label">Освітньо-кваліфікаційний рівень:</label>
                <input id="degree_student" class="form-control" th:field="*{degree}"/>
            </div>
            <div class="form-group">
                <label for="specialty" class="control-label">Спеціальність:</label>
                <input id="specialty" class="form-control" th:field="*{specialty}"/>
            </div>
            <div class="form-group">
                <label for="year" class="control-label">Рік навчання (курс):</label>
                <input id="year" class="form-control" th:field="*{year}"/>
            </div>
            <div class="form-group">
                <input type="submit" class="form-control btn btn-primary" value="Обрати"/>
            </div>
        </form>
    </section>

    <section id="employee">
        <h4>Працівник</h4>
        <form th:method="post" th:action="@{/account/choose}" th:object="${employee}">
            <input type="hidden" name="person" value="employee">
            <!-- class Person -->
            <div class="form-group">
                <label for="name_employee" class="control-label">Ім'я:</label>
                <input id="name_employee" class="form-control" th:field="*{name}"/>
            </div>
            <div class="form-group">
                <label for="surname_employee" class="control-label">Прізвище:</label>
                <input id="surname_employee" class="form-control" th:field="*{surname}"/>
            </div>
            <div class="form-group">
                <label for="patronymic_employee" class="control-label">По батькові:</label>
                <input id="patronymic_employee" class="form-control" th:field="*{patronymic}"/>
            </div>
            <!-- class Employee -->
            <div class="form-group">
                <label for="position" class="control-label">Посада:</label>
                <input id="position" class="form-control" th:field="*{position}"/>
            </div>
            <div class="form-group">
                <label for="degree_employee" class="control-label">Науковий ступінь:</label>
                <input id="degree_employee" class="form-control" th:field="*{degree}"/>
            </div>
            <div class="form-group">
                <input type="submit" class="form-control btn btn-primary" value="Обрати"/>
            </div>
        </form>
    </section>

</div>
</body>
</html>
